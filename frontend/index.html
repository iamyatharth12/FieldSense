<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldSense</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body class="bg-[#0B120F] text-white font-sans min-h-screen flex flex-col items-center justify-center p-4 relative overflow-x-hidden">

    <!-- Background Mesh Gradients -->
    <div class="fixed inset-0 z-0 opacity-40 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-emerald-900 filter blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-blue-900 filter blur-[120px]"></div>
        <div class="absolute top-[20%] right-[10%] w-[400px] h-[400px] rounded-full bg-lime-800 filter blur-[100px]"></div>
    </div>

    <div class="relative z-10 w-full max-w-md flex flex-col items-center">
        <!-- Header -->
        <h1 class="text-4xl font-bold tracking-tight mb-8">🌱 FieldSense</h1>
        
        <!-- Main Interface Container -->
        <div class="w-full bg-[#161b18]/80 backdrop-blur-2xl border border-white/10 rounded-[48px] shadow-2xl p-8 relative flex flex-col">
            
            <label class="relative w-full rounded-3xl border-2 border-dashed border-white/10 bg-black/20 flex flex-col items-center justify-center group mb-6 p-10 cursor-pointer hover:bg-black/30 transition-colors" id="fileLabel">
                <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                </div>
                <div class="text-white/60 font-medium text-center">Tap to select crop image</div>
                <div class="text-white/30 text-xs mt-1">PNG, JPG up to 10MB</div>
                <input type="file" id="imageInput" accept="image/*">
            </label>

            <img id="preview" alt="Image preview" class="w-full rounded-2xl mb-6 shadow-lg border border-white/10 object-cover" style="display: none;">

            <button id="analyzeBtn" disabled class="w-full h-14 w-full rounded-2xl bg-emerald-500 text-black font-bold tracking-tight hover:bg-emerald-400 transition-colors flex items-center justify-center gap-2 disabled:bg-emerald-500/30 disabled:text-emerald-900/50 disabled:cursor-not-allowed">
                ANALYZE CROP
            </button>

            <div id="loading" class="text-center font-medium text-emerald-400 mt-6 animate-pulse" style="display: none;">
                Analyzing crop...
            </div>

            <!-- Analysis Results -->
            <div class="space-y-3 mt-6" id="resultBox" style="display: none;">
                <div class="p-4 rounded-2xl bg-emerald-500/10 border border-emerald-500/20">
                    <div class="text-[10px] text-emerald-400 font-bold uppercase tracking-wider mb-1">Disease</div>
                    <div class="text-white text-sm" id="resDisease"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="p-4 rounded-2xl bg-white/5 border border-white/10">
                        <div class="text-[10px] text-white/40 font-bold uppercase tracking-wider mb-1">Action</div>
                        <div class="text-white text-sm leading-tight" id="resAction"></div>
                    </div>
                    <div class="p-4 rounded-2xl bg-amber-500/10 border border-amber-500/20">
                        <div class="text-[10px] text-amber-400 font-bold uppercase tracking-wider mb-1">Warning</div>
                        <div class="text-white text-sm leading-tight" id="resWarning"></div>
                    </div>
                </div>
                <div class="p-4 rounded-2xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-between">
                    <div>
                        <div class="text-[10px] text-blue-400 font-bold uppercase tracking-wider mb-1">Weather Advice</div>
                        <div class="text-white text-sm" id="resWeather"></div>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                </div>
            </div>
            
            <!-- Bottom Decor -->
            <div class="h-1.5 w-1/3 bg-white/10 rounded-full mx-auto mt-6"></div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const fileLabel = document.getElementById('fileLabel');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const resultBox = document.getElementById('resultBox');

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    fileLabel.style.display = 'none';
                    analyzeBtn.disabled = false;
                }
                reader.readAsDataURL(file);
            }
        });

        analyzeBtn.addEventListener('click', async function() {
            const file = imageInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // UI updates
            analyzeBtn.style.display = 'none';
            loading.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                document.getElementById('resDisease').textContent = data.disease;
                document.getElementById('resAction').textContent = data.action;
                document.getElementById('resWarning').textContent = data.warning;
                document.getElementById('resWeather').textContent = data.weather_advice;
                
                resultBox.style.display = 'block';
            } catch (error) {
                console.error("Error analyzing image:", error);
                document.getElementById('resDisease').textContent = "Fallback: Possible crop issue.";
                document.getElementById('resAction').textContent = "Monitor closely.";
                document.getElementById('resWarning').textContent = "System error during analysis.";
                document.getElementById('resWeather').textContent = "Check conditions before action";
                resultBox.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                analyzeBtn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
